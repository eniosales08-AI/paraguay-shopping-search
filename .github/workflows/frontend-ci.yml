name: Frontend CI

on:
  push:
    branches: [main, master]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

defaults:
  run:
    working-directory: frontend

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Smoke test API
        run: |
          npx next start &
          sleep 15
          curl -sf http://localhost:3000/api/search -o response.json || (echo "API não respondeu" && exit 1)
          node -e "
            const d = require('./response.json');
            if (!Array.isArray(d.results)) throw new Error('results não é array');
            if (typeof d.total !== 'number') throw new Error('total não é número');
            if (!d.facets) throw new Error('facets ausente');
            console.log('Smoke OK: results=%d, total=%d', d.results.length, d.total);
          "

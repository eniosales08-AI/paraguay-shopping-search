openapi: 3.0.3
info:
  title: Paraguay Shopping Search API
  description: API de búsqueda y catálogo para el sitio de compras del Paraguay. Congnittusai.
  version: 1.0.0

servers:
  - url: http://localhost:4000
    description: Desarrollo local
  - url: /api
    description: Relativo (Next.js API routes)

paths:
  /search:
    get:
      operationId: search
      summary: Buscar productos
      description: Búsqueda con texto libre, filtros (categoría, tienda, precio) y facetas.
      parameters:
        - name: q
          in: query
          schema: { type: string }
          description: Texto libre (título, descripción, categoría)
        - name: category
          in: query
          schema: { type: string }
          description: Filtro por categoría
        - name: store
          in: query
          schema: { type: string }
          description: Filtro por tienda
        - name: price_min
          in: query
          schema: { type: number }
          description: Precio mínimo (PYG)
        - name: price_max
          in: query
          schema: { type: number }
          description: Precio máximo (PYG)
        - name: sort
          in: query
          schema:
            type: string
            enum: [relevance, price_asc, price_desc, updated_desc]
          description: Ordenación
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        '200':
          description: Resultados y facetas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '500':
          description: Error interno

components:
  schemas:
    Product:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        description: { type: string, nullable: true }
        price_pyg: { type: number }
        store: { type: string }
        url: { type: string }
        image_url: { type: string, nullable: true }
        category: { type: string, nullable: true }
        locale: { type: string, example: es-PY }
        currency: { type: string, example: PYG }
    FacetItem:
      type: object
      properties:
        value: { type: string }
        count: { type: integer }
    PriceRange:
      type: object
      properties:
        min: { type: number }
        max: { type: number }
    SearchResponse:
      type: object
      required: [results, total, page, limit, facets]
      properties:
        results:
          type: array
          items: { $ref: '#/components/schemas/Product' }
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }
        facets:
          type: object
          properties:
            categories: { type: array, items: { $ref: '#/components/schemas/FacetItem' } }
            stores: { type: array, items: { $ref: '#/components/schemas/FacetItem' } }
            price_range: { $ref: '#/components/schemas/PriceRange' }
